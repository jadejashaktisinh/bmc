services:

   db:
     image: mysql:8.0
     restart: always
     command: --default-authentication-plugin=mysql_native_password
     environment:
       MYSQL_DATABASE: bmc
       MYSQL_PASSWORD: ${MYSQL_PASSWORD}
       MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
     volumes:
       - db:/var/lib/mysql

   wordpress:
      build:
        context: .
        dockerfile: Dockerfile.wordpress
      restart: always
      depends_on:
        - db
      ports:
        - 8080:80
      environment:
        WORDPRESS_DB_HOST: db
        WORDPRESS_DB_USER: ${MYSQL_USER}
        WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
        WORDPRESS_DB_NAME: bmc
        WORDPRESS_CONFIG_EXTRA: |
          define('WP_HOME', 'http://bmc.com/admin');
          define('WP_SITEURL', 'http://bmc.com/admin');
          
          $$proxy_path = '/admin';
          
          if (strpos($$_SERVER['REQUEST_URI'], $$proxy_path) !== 0) {
              $$_SERVER['REQUEST_URI'] = $$proxy_path . $$_SERVER['REQUEST_URI'];
          }
          if (strpos($$_SERVER['SCRIPT_NAME'], $$proxy_path) !== 0) {
              $$_SERVER['SCRIPT_NAME'] = $$proxy_path . $$_SERVER['SCRIPT_NAME'];
          }
          if (strpos($$_SERVER['PHP_SELF'], $$proxy_path) !== 0) {
              $$_SERVER['PHP_SELF'] = $$proxy_path . $$_SERVER['PHP_SELF'];
          }
          
          define('ADMIN_COOKIE_PATH', '/admin');
          define('COOKIEPATH', '/admin');
          define('SITECOOKIEPATH', '/admin');
          define('COOKIE_DOMAIN', false);

      volumes:
         - wordpress:/var/www/html

   frontend:
      build:
        context: ./nextapp
        target:  runner
      depends_on:
        - wordpress
      ports:
        - 3000:3000
    
   postgress:
      image: postgres
      restart: always
      environment:
        POSTGRES_DB: bmc
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql
 

   server:
      build:
        context: ./server
      depends_on:
        - postgress
      ports:
        - 5000:5000

volumes:
  db:
  wordpress:
  postgres_data:
