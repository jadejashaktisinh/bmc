services:

   db:
     image: mysql:8.0
     restart: always
     command: --default-authentication-plugin=mysql_native_password
     environment:
       MYSQL_DATABASE: bmc
       MYSQL_USER: ${MYSQL_USER}
       MYSQL_PASSWORD: ${MYSQL_PASSWORD}
       MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
     volumes:
       - db:/var/lib/mysql

   wordpress:
      image: wordpress
      restart: always
      depends_on:
        - db
      ports:
        - 8080:80
      environment:
        WORDPRESS_DB_HOST: db
        WORDPRESS_DB_USER: ${MYSQL_USER}
        WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
        WORDPRESS_DB_NAME: bmc
      volumes:
         - wordpress:/var/www/html

   frontend:
      build:
        context: ./nextapp
        target:  runner
      depends_on:
        - wordpress
      ports:
        - 3000:3000

volumes:
  db:
  wordpress:
